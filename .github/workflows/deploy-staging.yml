name: Deploy Staging

on:
  workflow_dispatch:
  push:
    branches:
      - develop
  schedule:
    - cron: "0 3 20 * *"

# https://ashishb.net/tech/common-pitfalls-of-github-actions/
jobs:
  build_and_deploy:
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
      - name: Build
        run: |
          npm ci
          cd ./functions && npm ci && cd ..
          npm run test:unit
          npm run build-staging
      - name: Setup Google Auth
        uses: "google-github-actions/auth@v3"
        with:
          credentials_json: "${{secrets.FIREBASE_SERVICE_ACCOUNT_DEV}}"
      - name: Deploy
        run: npx firebase-tools@latest deploy --project staging --non-interactive --force --json
